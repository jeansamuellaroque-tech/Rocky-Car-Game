<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Car Glass Game</title>

  <link rel="icon" href="assets/img/favicon.png">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

<!-- 🔝 NAVBAR GLASS -->
<nav class="glass navbar navbar-expand-lg">
  <div class="container-fluid">
    <span class="navbar-brand text-white fw-bold">🚗 Race Car</span>
    <span class="text-white">Tu Nombre</span>
  </div>
</nav>

<div class="container mt-4">

  <div class="row">

    <!-- PANEL -->
    <div class="col-md-3 mb-3">
      <div class="glass p-3">
        <h5>📊 Stats</h5>
        <p>Score: <span id="score">0</span></p>
        <p>Nivel: <span id="level">1</span></p>
        <p>High: <span id="highScore">0</span></p>
      </div>

      <div class="glass p-3 mt-3">
        <h5>📖 Controles</h5>
        <ul>
          <li>⬅️➡️ mover</li>
          <li>⬆️⬇️ avanzar</li>
          <li>📱 tocar pantalla</li>
          <li>P = pausa</li>
        </ul>
      </div>
    </div>

    <!-- JUEGO -->
    <div class="col-md-6 text-center">
      <canvas id="gameCanvas"></canvas>

      <!-- MOBILE -->
      <div class="d-md-none mt-3">
        <button onclick="moveLeft()" class="btn btn-light m-1">⬅️</button>
        <button onclick="moveRight()" class="btn btn-light m-1">➡️</button>
      </div>
    </div>

    <!-- INFO -->
    <div class="col-md-3">
      <div class="glass p-3">
        <h5>🎯 Objetivo</h5>
        <p>Evita coches y sube nivel.</p>
      </div>
    </div>

  </div>

</div>

<footer class="glass text-center mt-4 p-3 text-white">
  <p>Tu Nombre - 2026</p>
</footer>

<script src="assets/js/main.js"></script>
</body>
</html>
